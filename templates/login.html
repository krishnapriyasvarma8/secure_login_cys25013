<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      background-color: #d8f5e1;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background-color: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      width: 350px;
      text-align: center;
    }

    h2 {
      margin-bottom: 24px;
      color: #2e7d52;
    }

    input {
      width: 100%;
      padding: 10px 14px;
      margin-bottom: 16px;
      border: 1px solid #b2dfcc;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
    }

    input:focus {
      border-color: #2e7d52;
    }

    button {
      width: 100%;
      padding: 10px;
      background-color: #2e7d52;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
    }

    button:hover {
      background-color: #245f40;
    }

    a {
      display: block;
      margin-top: 16px;
      color: #2e7d52;
      font-size: 13px;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="box">
    <h2>Welcome Back</h2>
    <form method="POST" action="/login">
      <input name="username" placeholder="Username" required />
      <input name="password" type="password" placeholder="Password" required />
      <button type="submit">Login</button>
    </form>
    <a href="/register">No account? Register</a>
  </div>
</body>
</html>
