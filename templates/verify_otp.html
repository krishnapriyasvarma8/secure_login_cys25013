<!DOCTYPE html>
<html>
<head>
  <title>Enter OTP</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',sans-serif; }
    body { background-color:#d8f5e1; display:flex; justify-content:center; align-items:center; height:100vh; }
    .box { background:white; padding:40px; border-radius:12px; box-shadow:0 4px 15px rgba(0,0,0,0.1); width:350px; text-align:center; }
    h2 { color:#2e7d52; margin-bottom:8px; }
    p { font-size:13px; color:#555; margin-bottom:20px; }
    input { width:100%; padding:10px 14px; margin-bottom:16px; border:1px solid #b2dfcc; border-radius:8px; font-size:18px; text-align:center; letter-spacing:6px; outline:none; }
    input:focus { border-color:#2e7d52; }
    button { width:100%; padding:10px; background-color:#2e7d52; color:white; border:none; border-radius:8px; font-size:15px; cursor:pointer; }
    button:hover { background-color:#245f40; }
    .error { color:red; font-size:13px; margin-bottom:12px; }
  </style>
</head>
<body>
  <div class="box">
    <h2><b>Two-Factor Auth</b></h2>
    <p>Enter the 6-digit code from Google Authenticator</p>
    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}
    <form method="POST" action="/verify-otp">
      <input type="password" name="otp" placeholder="000000" maxlength="6" required autofocus />
      <button type="submit">Verify</button>
    </form>
  </div>
</body>
</html>
