<!DOCTYPE html>
<html>
<head>
  <title>Setup 2FA</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',sans-serif; }
    body { background-color:#d8f5e1; display:flex; justify-content:center; align-items:center; min-height:100vh; }
    .box { background:white; padding:40px; border-radius:12px; box-shadow:0 4px 15px rgba(0,0,0,0.1); width:400px; text-align:center; }
    h2 { color:#2e7d52; margin-bottom:16px; }
    p { font-size:13px; color:#555; margin-bottom:12px; }
    .secret { background:#f0faf4; border:1px dashed #2e7d52; padding:8px; border-radius:8px; font-size:13px; word-break:break-all; margin-bottom:16px; }
    img { margin-bottom:16px; border-radius:8px; }
    .hash { background:#f9f9f9; border:1px solid #ddd; padding:8px; border-radius:8px; font-size:11px; word-break:break-all; color:#888; margin-bottom:16px; }
    a { display:block; margin-top:8px; color:#2e7d52; font-size:13px; text-decoration:none; }
    a:hover { text-decoration:underline; }
  </style>
</head>
<body>
  <div class="box">
    <h2>Setup 2FA</h2>
    <p>Scan this QR code with <strong>Google Authenticator</strong>:</p>
    <img src="data:image/png;base64,{{ qr_img }}" width="200" />
    <p>Or enter this secret manually:</p>
    <div class="secret">{{ secret }}</div>
    <p style="font-size:12px;color:#999;">Your password is stored as:</p>
    <div class="hash">{{ password_hash }}</div>
    <a href="/login">Go to Login</a>
  </div>
</body>
</html>
